name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          google-chrome-stable --version || sudo apt-get install -y google-chrome-stable

      - name: Start Server
        run: |
          pkill -f "bun start" || true
          pkill -f Xvfb || true
          
          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          sleep 3
          
          bun start 2>&1 | tee server.log &
          
          echo "Waiting for port 3000..."
          for i in {1..40}; do
            if ss -lnt | grep -q ":3000"; then
              echo "✅ Port ready - waiting extra 15s for Chrome to be ready"
              sleep 15
              break
            fi
            sleep 3
          done

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        timeout-minutes: 15
        run: |
          max_attempts=6
          delay=20
          token=""
          
          for attempt in $(seq 1 $max_attempts); do
            echo "========================================="
            echo "ATTEMPT $attempt/$max_attempts"
            echo "========================================="
            
            # Let the first attempt have an extra long timeout since Chrome hasn't launched
            TIMEOUT=180
            if [ $attempt -eq 1 ]; then
              TIMEOUT=240
              echo "First attempt - giving Chrome extra time to boot (240s)..."
            fi
            
            RESP=$(curl -s -m $TIMEOUT -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1)
            
            echo "Response: ${RESP:0:500}"
            
            if echo "$RESP" | jq -e . >/dev/null 2>&1; then
              CODE=$(echo "$RESP" | jq -r '.code // ""')
              EXTRACTED=$(echo "$RESP" | jq -r '.token // ""')
              
              if [ "$CODE" = "200" ] && [ -n "$EXTRACTED" ] && [ "$EXTRACTED" != "null" ]; then
                token="$EXTRACTED"
                echo "✅ Token captured!"
                break
              else
                echo "❌ Code: $CODE, Message: $(echo "$RESP" | jq -r '.message // "unknown"')"
              fi
            else
              echo "❌ Invalid response"
            fi
            
            echo "Retrying in ${delay}s..."
            sleep $delay
            delay=$((delay + 10))
            [ $delay -gt 90 ] && delay=90
          done
          
          if [ -z "$token" ]; then
            echo "❌ Failed"
            tail -50 server.log
            exit 1
          fi
          
          echo "========================================="
          echo "EXTRACTING COOKIE"
          echo "========================================="
          
          COOKIE_RESP=$(curl -s -m 30 -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}")
          
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | sed 's/^[^:]*:\s*//' | cut -d';' -f1 | tr -d '\r\n')
          
          if [ -z "$COOKIE" ]; then
            echo "❌ No cookie"
            echo "$COOKIE_RESP" | head -30
            exit 1
          fi
          
          echo "✅ Cookie: ${COOKIE:0:60}..."
          
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"
          
          echo "✅ Done."
