name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libatk-bridge2.0-0
          google-chrome --version || echo "Chrome not found, installing..."
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start API Server with Xvfb
        run: |
          export CHROME_PATH="/usr/bin/google-chrome-stable"
          export PORT=3000
          export NODE_ENV=production
          
          # Force Xvfb to run properly
          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          
          # Start the server with explicit Xvfb flag
          bun start --disableXvfb=false &
          
          # Wait with health check pings
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/health | grep -q "200"; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

      - name: Orchestrate API Tasks & Update Upstash
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          attempt=1
          max_attempts=5
          success=false
          token=""

          while [ $attempt -le $max_attempts ]; do
            echo "========================================="
            echo "STARTING ATTEMPT $attempt OF $max_attempts"
            echo "========================================="
            
            # Add timeout and better error handling
            INIT_RESP=$(curl -s -m 60 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode": "turnstile", "domain": "https://deltastudy.site/verify", "siteKey": "0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1)
            
            CURL_EXIT=$?
            
            if [ $CURL_EXIT -ne 0 ] || [ -z "$INIT_RESP" ]; then
              echo "CURL failed with exit code $CURL_EXIT"
              echo "Response: $INIT_RESP"
              attempt=$((attempt+1))
              sleep 10
              continue
            fi
            
            echo "Raw response: $INIT_RESP"
            
            # Safely parse JSON without failing on empty
            if echo "$INIT_RESP" | jq -e . >/dev/null 2>&1; then
              CODE=$(echo "$INIT_RESP" | jq -r '.code // "500"')
              EXTRACTED_TOKEN=$(echo "$INIT_RESP" | jq -r '.token // ""')
              MESSAGE=$(echo "$INIT_RESP" | jq -r '.message // ""')
            else
              echo "Invalid JSON response"
              attempt=$((attempt+1))
              sleep 10
              continue
            fi
            
            echo "Parsed code: $CODE"
            echo "Parsed token: ${EXTRACTED_TOKEN:0:20}..."
            
            # Validate token properly
            if [ -n "$EXTRACTED_TOKEN" ] && [ "$EXTRACTED_TOKEN" != "null" ] && [ "$CODE" = "200" ]; then
              token="$EXTRACTED_TOKEN"
              echo "✅ Task success! Valid token extracted."
              success=true
              break
            else
              echo "❌ Attempt $attempt failed. Code: $CODE, Message: $MESSAGE"
              attempt=$((attempt+1))
              if [ $attempt -le $max_attempts ]; then
                echo "Retrying in 10 seconds..."
                sleep 10
              fi
            fi
          done

          if [ "$success" != "true" ]; then
            echo "❌ Error: Failed to obtain a token after $max_attempts attempts."
            exit 1
          fi

          echo "========================================="
          echo "POSTING TOKEN AND EXTRACTING COOKIE"
          echo "========================================="
          
          # Better cookie extraction with timeout
          COOKIE_RESP=$(curl -s -m 30 -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$token\"}" 2>&1)
          
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -n 1 | sed 's/^[^:]*:\s*//' | tr -d '\r\n' | cut -d';' -f1)
          
          if [ -z "$COOKIE" ]; then
            echo "❌ Error: No 'set-cookie' header found."
            echo "Full response headers:"
            echo "$COOKIE_RESP" | head -20
            exit 1
          fi
          
          echo "✅ Successfully captured cookie: ${COOKIE:0:50}..."

          echo "========================================="
          echo "UPDATING UPSTASH REDIS"
          echo "========================================="
          
          # Upstash SET operation with proper error handling
          UPSTASH_RESP=$(curl -s -m 30 -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]")
          
          if echo "$UPSTASH_RESP" | jq -e '.result == "OK"' >/dev/null 2>&1; then
            echo "✅ Upstash update successful!"
          else
            echo "⚠️ Upstash update may have failed: $UPSTASH_RESP"
            # Don't exit - cookie already captured
          fi
