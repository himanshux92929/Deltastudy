name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable

      - name: Create Standalone Solver Script
        run: |
          cat > solve.js << 'EOF'
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());
          
          const siteKey = '0x4AAAAAADnpjMgvQPlaYYog';
          const targetUrl = 'https://deltastudy.site/verify';
          
          async function solveTurnstile() {
            console.log('Launching browser...');
            const browser = await puppeteer.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu'
              ],
              executablePath: '/usr/bin/google-chrome-stable'
            });
            
            const page = await browser.newPage();
            await page.goto(targetUrl, { waitUntil: 'networkidle2', timeout: 60000 });
            console.log('Page loaded, waiting for turnstile...');
            
            // Wait for turnstile to render and solve
            await page.waitForSelector('.cf-turnstile iframe', { timeout: 30000 }).catch(() => {});
            await page.waitForTimeout(5000);
            
            // Check for token in page or console
            const token = await page.evaluate(() => {
              return window.turnstile?.getResponse() || null;
            }).catch(() => null);
            
            if (token) {
              console.log('Token found:', token.substring(0, 30) + '...');
              console.log(JSON.stringify({ code: 200, token: token }));
            } else {
              console.log('No token found, trying to capture from network');
              // Fallback: capture from network responses
              let capturedToken = null;
              const client = await page.target().createCDPSession();
              await client.send('Network.enable');
              client.on('Network.responseReceived', (params) => {
                if (params.response.url.includes('turnstile') || params.response.url.includes('cf')) {
                  console.log('Intercepted response:', params.response.url);
                }
              });
              
              // Wait and retry
              await page.waitForTimeout(15000);
              const token2 = await page.evaluate(() => {
                return window.turnstile?.getResponse() || null;
              });
              
              if (token2) {
                console.log('Token found on retry:', token2.substring(0, 30) + '...');
                console.log(JSON.stringify({ code: 200, token: token2 }));
              } else {
                console.log(JSON.stringify({ code: 500, message: 'No token captured' }));
              }
            }
            
            await browser.close();
          }
          
          solveTurnstile().catch(err => {
            console.error('Error:', err.message);
            console.log(JSON.stringify({ code: 500, message: err.message }));
            process.exit(1);
          });
          EOF

      - name: Solve Turnstile Directly
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISPLAY: :99
        timeout-minutes: 10
        run: |
          # Start Xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 3
          
          # Run the solver directly
          echo "Running solver..."
          RESULT=$(bun run solve.js 2>&1)
          echo "$RESULT"
          
          # Extract token from JSON output
          TOKEN=$(echo "$RESULT" | grep -o '{"code":200,"token":"[^"]*"}' | sed 's/{"code":200,"token":"\(.*\)"}/\1/')
          
          if [ -z "$TOKEN" ]; then
            echo "❌ Failed to extract token"
            echo "Full output: $RESULT"
            exit 1
          fi
          
          echo "✅ Token: ${TOKEN:0:30}..."
          
          echo "========================================="
          echo "EXTRACTING COOKIE"
          echo "========================================="
          
          COOKIE_RESP=$(curl -s -m 30 -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}")
          
          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | sed 's/^[^:]*:\s*//' | cut -d';' -f1 | tr -d '\r\n')
          
          if [ -z "$COOKIE" ]; then
            echo "❌ No cookie"
            echo "$COOKIE_RESP" | head -30
            exit 1
          fi
          
          echo "✅ Cookie: ${COOKIE:0:60}..."
          
          curl -s -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]"
          
          echo "Done."
