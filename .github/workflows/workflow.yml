name: Clone, Build & Notify via Upstash Redis

on:
  repository_dispatch:
    types: [health-check]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/abhinai2244/cf-bypass  # <-- replace with your actual repo URL
  REPO_REF: master

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Clone target repository
        run: |
          git clone --branch "$REPO_REF" "$REPO_URL" cloned-repo

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: cloned-repo
        run: bun install

      - name: Start the server
        working-directory: cloned-repo
        run: bun start

      - name: Notify success to Upstash Redis
        if: success()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/success" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"

      - name: Notify failure to Upstash Redis
        if: failure()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/failed" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"
