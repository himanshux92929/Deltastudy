name: Clone, Build & Notify via Upstash Redis

on:
  repository_dispatch:
    types: [health-check]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/abhinai2444/cf-bypass   # <-- replace with your actual repo URL
  REPO_REF: master

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Clone target repository
        run: |
          git clone --branch "$REPO_REF" "$REPO_URL" cloned-repo

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2t64 libx11-xcb1 fonts-liberation libappindicator3-1 \
            xdg-utils

      - name: Install dependencies
        working-directory: cloned-repo
        run: bun install

      - name: Install Chromium for Puppeteer
        working-directory: cloned-repo
        run: npx puppeteer browsers install chrome

      - name: Start the server
        working-directory: cloned-repo
        run: bun start

      - name: Notify success to Upstash Redis
        if: success()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/success" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"

      - name: Notify failure to Upstash Redis
        if: failure()
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          curl -X POST "$UPSTASH_REDIS_REST_URL/set/job_status/failed" \
            -H "Authorization: Bearer $UPSTASH_REDIS_REST_TOKEN"
