name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Build Docker Image (as recommended by README)
        run: |
          echo "Building Docker image..."
          docker build -t cf-bypass-solver .
          echo "Docker image built successfully."

      - name: Start Docker Container
        run: |
          # Clean up any old container
          docker rm -f cf-bypass-container 2>/dev/null || true

          # Run the container in detached mode, mapping port 3000
          docker run -d \
            --name cf-bypass-container \
            -p 3000:3000 \
            -e PORT=3000 \
            -e NODE_ENV=production \
            -e timeOut=180000 \
            cf-bypass-solver

          echo "Container started. Waiting for server readiness..."

          # Wait for port 3000 inside the container
          for i in $(seq 1 60); do
            if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Port 3000 accepting connections after $((i * 2))s"
              break
            fi
            # Check if container is still running
            if ! docker ps | grep -q cf-bypass-container; then
              echo "ERROR: Container died during startup! Logs:"
              docker logs cf-bypass-container
              exit 1
            fi
            sleep 2
          done

          # Wait for "Browser initialized" in container logs
          echo "Waiting for browser initialization inside container..."
          for i in $(seq 1 40); do
            if docker logs cf-bypass-container 2>&1 | grep -q "Browser initialized"; then
              echo "Browser initialized after $((i * 2))s"
              break
            fi
            if ! docker ps | grep -q cf-bypass-container; then
              echo "ERROR: Container died during browser init! Logs:"
              docker logs cf-bypass-container
              exit 1
            fi
            sleep 2
          done

          echo "Server fully ready inside Docker container."

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          TOKEN=""
          for i in 1 2 3 4 5; do
            echo ""
            echo "=========================================="
            echo "=== Turnstile Attempt $i of 5 ==="
            echo "=========================================="

            # Check if container is alive
            if ! docker ps | grep -q cf-bypass-container; then
              echo "Container died! Restarting..."
              docker rm -f cf-bypass-container 2>/dev/null || true
              docker run -d \
                --name cf-bypass-container \
                -p 3000:3000 \
                -e PORT=3000 \
                -e NODE_ENV=production \
                -e timeOut=180000 \
                cf-bypass-solver
              echo "Waiting for container to be ready..."
              sleep 15
              for j in $(seq 1 30); do
                if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
                  echo "Container back online after $((j * 2))s"
                  break
                fi
                sleep 2
              done
            fi

            echo "Calling /cloudflare (curl timeout: 240s)..."
            RESP=$(curl -s -m 240 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "CURL_FAILED")

            echo "Response preview: ${RESP:0:400}"

            if [ "$RESP" = "CURL_FAILED" ]; then
              echo "Curl returned nothing (timeout or connection refused)"
              echo "Container logs (last 20 lines):"
              docker logs cf-bypass-container 2>&1 | tail -20
              continue
            fi

            TOKEN=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")

            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo ""
              echo "✓ TOKEN OBTAINED: ${TOKEN:0:60}..."
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi

            echo "No valid token in response."
            if echo "$RESP" | grep -qE "Timeout Error|error|500"; then
              echo "Server-side error detected — container logs:"
              docker logs cf-bypass-container 2>&1 | tail -20
            fi

            sleep 10
          done

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo ""
            echo "=========================================="
            echo "ERROR: All 5 attempts failed to get token"
            echo "=========================================="
            echo "Full container logs:"
            docker logs cf-bypass-container 2>&1
            exit 1
          fi

          echo "Token captured and stored in GITHUB_ENV"

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          echo "Exchanging Turnstile token for session cookie..."
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" 2>&1 || echo "COOKIE_REQUEST_FAILED")

          if [ "$COOKIE_RESP" = "COOKIE_REQUEST_FAILED" ]; then
            echo "ERROR: Cookie exchange request failed entirely"
            exit 1
          fi

          echo "Response headers from cookie exchange:"
          echo "$COOKIE_RESP" | head -25

          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')

          if [ -z "$COOKIE" ]; then
            echo "ERROR: No Set-Cookie header found in response"
            echo "Full response:"
            echo "$COOKIE_RESP"
            exit 1
          fi

          echo "Cookie extracted: ${COOKIE:0:80}..."
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "Storing cookie in Upstash Redis..."
          UPSTASH_RESP=$(curl -s -w "\n%{http_code}" -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]" 2>&1)

          HTTP_CODE=$(echo "$UPSTASH_RESP" | tail -1)
          BODY=$(echo "$UPSTASH_RESP" | sed '$d')

          echo "Upstash HTTP status: $HTTP_CODE"
          echo "Upstash response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upstash update returned non-200 status ($HTTP_CODE)"
            exit 1
          fi

          echo "✓ Cookie successfully stored in Upstash as 'solver_cookie'"
