name: Run External API Task & Orchestrate Pipeline

on:
  repository_dispatch:
    types: [run-solver-task]
  workflow_dispatch:

jobs:
  run-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout External Public Repo
        uses: actions/checkout@v4
        with:
          repository: 'abhinai2244/cf-bypass'

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing xvfb
          echo "Chrome: $(which google-chrome-stable)"
          google-chrome-stable --version
          sudo ln -sf /usr/bin/google-chrome-stable /usr/bin/google-chrome
          sudo ln -sf /usr/bin/google-chrome-stable /usr/bin/chromium-browser

      - name: Patch turnstile.ts
        run: |
          echo "" | base64 -d > src/lib/ends/turnstile.ts
          echo "Patched. First 5 lines:"
          head -5 src/lib/ends/turnstile.ts
          echo "Line count:"
          wc -l src/lib/ends/turnstile.ts

      - name: Patch index.ts to remove conflicting interceptor from getPage
        run: |
          node -e "
            const fs = require('fs');
            let src = fs.readFileSync('src/index.ts', 'utf8');
            const before = src;
            src = src.replace(
              /await page\.setRequestInterception\(true\);\s*page\.on\('request'[\s\S]*?\}\);\n/,
              ''
            );
            if (src === before) {
              console.log('WARNING: pattern not matched, index.ts unchanged');
            } else {
              fs.writeFileSync('src/index.ts', src);
              console.log('index.ts patched: conflicting interceptor removed');
            }
          "
          grep -n "setRequestInterception" src/index.ts && echo "WARNING: still present" || echo "Confirmed: interceptor block gone"

      - name: Start Server & Wait for Readiness
        run: |
          pkill -f "bun start" 2>/dev/null || true
          pkill -f Xvfb 2>/dev/null || true
          sleep 2

          Xvfb :99 -screen 0 1024x768x24 &
          export DISPLAY=:99
          export CHROME_PATH=/usr/bin/google-chrome-stable
          export PORT=3000
          export NODE_ENV=production
          export timeOut=60000

          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "CHROME_PATH=/usr/bin/google-chrome-stable" >> $GITHUB_ENV
          echo "PORT=3000" >> $GITHUB_ENV
          echo "timeOut=60000" >> $GITHUB_ENV

          bun start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          echo "Waiting for port 3000..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Port 3000 alive after $((i * 2))s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died during startup! Log:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for browser initialization..."
          for i in $(seq 1 40); do
            if grep -q "Browser initialized" /tmp/server.log 2>/dev/null; then
              echo "Browser initialized after $((i * 2))s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server died during browser init! Log:"
              cat /tmp/server.log
              exit 1
            fi
            sleep 2
          done

          echo "Server ready."

      - name: Solve Turnstile
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DISPLAY: :99
          CHROME_PATH: /usr/bin/google-chrome-stable
          PORT: 3000
          timeOut: 60000
          NODE_ENV: production
        run: |
          TOKEN=""
          for i in 1 2 3 4 5; do
            echo ""
            echo "=== Turnstile Attempt $i of 5 ==="

            if ! curl -s -o /dev/null --max-time 3 "http://127.0.0.1:3000" 2>/dev/null; then
              echo "Server down, restarting..."
              pkill -f "bun start" 2>/dev/null || true
              sleep 2
              DISPLAY=:99 CHROME_PATH=/usr/bin/google-chrome-stable PORT=3000 timeOut=60000 NODE_ENV=production bun start > /tmp/server.log 2>&1 &
              sleep 15
            fi

            echo "Calling /cloudflare (120s curl timeout)..."
            RESP=$(curl -s -m 120 -X POST "http://127.0.0.1:3000/cloudflare" \
              -H "Content-Type: application/json" \
              -d '{"mode":"turnstile","domain":"https://deltastudy.site/verify","siteKey":"0x4AAAAAADnpjMgvQPlaYYog"}' 2>&1 || echo "CURL_FAILED")

            echo "Response: ${RESP:0:500}"

            if [ "$RESP" = "CURL_FAILED" ]; then
              echo "Curl failed."
              tail -20 /tmp/server.log
              continue
            fi

            TOKEN=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")

            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              echo ""
              echo "TOKEN OBTAINED: ${TOKEN:0:60}..."
              echo "TOKEN=$TOKEN" >> $GITHUB_ENV
              break
            fi

            echo "No token yet. Server log tail:"
            tail -150 /tmp/server.log
            sleep 5
          done

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo ""
            echo "ERROR: All 5 attempts failed."
            echo "Full server log:"
            cat /tmp/server.log
            exit 1
          fi

          echo "Token captured."

      - name: Extract Cookie
        if: env.TOKEN != ''
        run: |
          echo "Exchanging token for cookie..."
          COOKIE_RESP=$(curl -s -i -X POST https://deltastudy.site/api/turnstile/verify \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$TOKEN\"}" 2>&1 || echo "COOKIE_REQUEST_FAILED")

          if [ "$COOKIE_RESP" = "COOKIE_REQUEST_FAILED" ]; then
            echo "ERROR: Cookie exchange request failed"
            exit 1
          fi

          COOKIE=$(echo "$COOKIE_RESP" | grep -i '^set-cookie:' | head -1 | cut -d';' -f1 | sed 's/^[^:]*:\s*//')

          if [ -z "$COOKIE" ]; then
            echo "ERROR: No Set-Cookie header found"
            exit 1
          fi

          echo "Cookie: ${COOKIE:0:80}..."
          echo "COOKIE=$COOKIE" >> $GITHUB_ENV

      - name: Update Upstash
        if: env.COOKIE != ''
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          echo "Storing cookie in Upstash..."
          UPSTASH_RESP=$(curl -s -w "\n%{http_code}" -X POST "${UPSTASH_REDIS_REST_URL}" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "[\"SET\", \"solver_cookie\", \"$COOKIE\"]" 2>&1)

          HTTP_CODE=$(echo "$UPSTASH_RESP" | tail -1)
          BODY=$(echo "$UPSTASH_RESP" | sed '$d')

          echo "Upstash status: $HTTP_CODE"
          echo "Upstash response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upstash update failed"
            exit 1
          fi

          echo "Cookie stored."
